<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient1)"/>
  
  <!-- Truck Body -->
  <rect x="120" y="180" width="140" height="80" rx="8" fill="#E5E7EB"/>
  <rect x="260" y="200" width="100" height="60" rx="8" fill="#F3F4F6"/>
  
  <!-- Truck Cabin -->
  <rect x="360" y="180" width="60" height="80" rx="8" fill="#D1D5DB"/>
  
  <!-- Windows -->
  <rect x="370" y="190" width="40" height="30" rx="4" fill="#3B82F6"/>
  <rect x="130" y="190" width="20" height="30" rx="4" fill="#3B82F6"/>
  
  <!-- Wheels -->
  <circle cx="160" cy="280" r="20" fill="#374151"/>
  <circle cx="220" cy="280" r="20" fill="#374151"/>
  <circle cx="380" cy="280" r="20" fill="#374151"/>
  
  <!-- Wheel Rims -->
  <circle cx="160" cy="280" r="12" fill="#6B7280"/>
  <circle cx="220" cy="280" r="12" fill="#6B7280"/>
  <circle cx="380" cy="280" r="12" fill="#6B7280"/>
  
  <!-- Truck Details -->
  <rect x="370" y="230" width="30" height="4" rx="2" fill="#9CA3AF"/>
  <rect x="370" y="240" width="25" height="4" rx="2" fill="#9CA3AF"/>
  
  <!-- Cargo Lines -->
  <rect x="130" y="210" width="120" height="2" rx="1" fill="#9CA3AF"/>
  <rect x="130" y="220" width="120" height="2" rx="1" fill="#9CA3AF"/>
  <rect x="130" y="230" width="120" height="2" rx="1" fill="#9CA3AF"/>
  
  <!-- AI Symbol -->
  <circle cx="320" cy="140" r="30" fill="#1E40AF"/>
  <path d="M310 130 L320 140 L330 130 M310 150 L320 140 L330 150" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="315" cy="135" r="2" fill="white"/>
  <circle cx="325" cy="135" r="2" fill="white"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>