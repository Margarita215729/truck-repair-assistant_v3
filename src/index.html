<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite Test App</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        max-width: 600px;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      }
      .success {
        background: rgba(255,255,255,0.2);
        padding: 20px;
        border-radius: 10px;
        margin: 20px 0;
        border-left: 5px solid #4CAF50;
      }
      .debug {
        background: rgba(0,0,0,0.3);
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 14px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🚀 Vite Server Test</h1>

      <div class="success">
        <h2 style="color: #4CAF50;">✅ Vite Server Working!</h2>
        <p>If you can see this page, then Vite is serving static HTML correctly.</p>
        <p><strong>Time:</strong> <span id="time"></span></p>
        <p><strong>URL:</strong> <span id="url"></span></p>
      </div>

      <div class="debug">
        <h3>🔍 Debug Information:</h3>
        <p>✅ HTML file loaded successfully</p>
        <p>✅ CSS styles applied</p>
        <p>✅ JavaScript executing</p>
        <p>✅ Server responding on port 3000</p>
        <p id="userAgent">🔄 Loading user agent...</p>
      </div>

      <div style="margin-top: 30px;">
        <button onclick="location.reload()" style="padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">
          🔄 Reload Page
        </button>
      </div>
    </div>

    <script>
      document.getElementById('time').textContent = new Date().toLocaleString();
      document.getElementById('url').textContent = window.location.href;
      document.getElementById('userAgent').textContent = '📱 ' + navigator.userAgent;

      console.log('🚀 Vite Test Page Loaded');
      console.log('⏰ Time:', new Date().toISOString());
      console.log('🌐 URL:', window.location.href);
      console.log('📱 User Agent:', navigator.userAgent);
    </script>
  </body>
</html>
