<!DOCTYPE html>
<html>
<head>
    <title>Vite Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div style="padding: 50px; text-align: center; font-family: Arial, sans-serif;">
        <h1>🚀 Vite Server Test</h1>
        <p style="color: #22c55e;">✅ Vite сервер работает!</p>
        <p>Время: <span id="time"></span></p>
        <p>Пользовательский агент: <span id="userAgent"></span></p>
        <p>URL: <span id="url"></span></p>

        <div style="margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 8px;">
            <h3>📋 Диагностика:</h3>
            <ul style="list-style: none; text-align: left;">
                <li>✅ HTML файл найден</li>
                <li>✅ Сервер отвечает</li>
                <li>✅ JavaScript работает</li>
                <li>✅ Стили загружаются</li>
            </ul>
        </div>

        <div style="margin-top: 30px;">
            <button onclick="location.reload()" style="padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer;">
                🔄 Перезагрузить
            </button>
        </div>
    </div>

    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        document.getElementById('userAgent').textContent = navigator.userAgent;
        document.getElementById('url').textContent = window.location.href;

        console.log('🚀 Vite Test Page Loaded');
        console.log('⏰ Time:', new Date().toISOString());
        console.log('🌐 URL:', window.location.href);
        console.log('📱 User Agent:', navigator.userAgent);
    </script>
</body>
</html>
