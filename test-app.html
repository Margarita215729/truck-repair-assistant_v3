<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .error { color: red; background: #ffe6e6; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { color: green; background: #e6ffe6; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .warning { color: orange; background: #fff3e6; padding: 10px; margin: 10px 0; border-radius: 4px; }
        #root { border: 2px solid #ddd; min-height: 200px; padding: 20px; margin: 20px 0; }
        .test-results { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🧪 React App Runtime Test</h1>
    <p>This page tests if the React app can render without runtime errors.</p>
    
    <div id="test-results" class="test-results">
        <div class="warning">⏳ Testing...</div>
    </div>
    
    <h2>App Output:</h2>
    <div id="root"></div>

    <!-- Load the built app -->
    <script type="module">
        const testResults = document.getElementById('test-results');
        
        function addResult(type, message) {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = message;
            testResults.appendChild(div);
        }
        
        // Clear initial message
        testResults.innerHTML = '';
        
        // Test 1: Check if React is available
        try {
            if (typeof React !== 'undefined') {
                addResult('success', '✅ React is loaded');
            } else {
                addResult('warning', '⚠️ React not found in global scope (might be bundled)');
            }
        } catch (e) {
            addResult('error', '❌ Error checking React: ' + e.message);
        }
        
        // Test 2: Check if root element exists
        const rootElement = document.getElementById('root');
        if (rootElement) {
            addResult('success', '✅ Root element found');
        } else {
            addResult('error', '❌ Root element not found');
        }
        
        // Test 3: Try to load and render the app
        let appLoaded = false;
        const loadTimeout = setTimeout(() => {
            if (!appLoaded) {
                addResult('error', '❌ App failed to load within 5 seconds');
                addResult('error', '💡 This suggests a runtime error or failed import');
            }
        }, 5000);
        
        // Test 4: Monitor for JavaScript errors
        window.addEventListener('error', (e) => {
            addResult('error', `❌ JavaScript Error: ${e.message}`);
            addResult('error', `   at ${e.filename}:${e.lineno}:${e.colno}`);
        });
        
        window.addEventListener('unhandledrejection', (e) => {
            addResult('error', `❌ Unhandled Promise Rejection: ${e.reason}`);
        });
        
        // Test 5: Check if app renders content
        const checkAppContent = () => {
            const rootContent = rootElement.innerHTML.trim();
            if (rootContent && rootContent !== '') {
                addResult('success', '✅ App rendered content to root element');
                addResult('success', `📊 Content length: ${rootContent.length} characters`);
                appLoaded = true;
                clearTimeout(loadTimeout);
                
                // Check for specific app elements
                if (rootContent.includes('Truck') || rootContent.includes('Diagnostic')) {
                    addResult('success', '✅ App-specific content detected');
                } else {
                    addResult('warning', '⚠️ Generic content detected - app might not be fully loaded');
                }
            } else {
                setTimeout(checkAppContent, 500);
            }
        };
        
        // Start checking after a brief delay
        setTimeout(checkAppContent, 1000);
        
        // Test 6: Try to dynamically import and test the app
        try {
            // This will try to load the built JS file
            const scripts = document.querySelectorAll('script[src]');
            if (scripts.length > 0) {
                addResult('success', `✅ Found ${scripts.length} script tag(s)`);
            } else {
                addResult('warning', '⚠️ No script tags found - app might not load');
            }
        } catch (e) {
            addResult('error', '❌ Error checking scripts: ' + e.message);
        }
    </script>
    
    <!-- Try to load the actual built app -->
    <script>
        // Find and load the main JS file from dist
        fetch('/dist/index.html')
            .then(response => response.text())
            .then(html => {
                // Extract script src from built index.html
                const scriptMatch = html.match(/<script[^>]*src="([^"]*)"[^>]*>/);
                if (scriptMatch) {
                    const scriptSrc = scriptMatch[1];
                    const script = document.createElement('script');
                    script.type = 'module';
                    script.src = '/dist/' + scriptSrc;
                    script.onload = () => {
                        document.getElementById('test-results').innerHTML += 
                            '<div class="success">✅ Main app script loaded successfully</div>';
                    };
                    script.onerror = () => {
                        document.getElementById('test-results').innerHTML += 
                            '<div class="error">❌ Failed to load main app script</div>';
                    };
                    document.head.appendChild(script);
                } else {
                    document.getElementById('test-results').innerHTML += 
                        '<div class="error">❌ Could not find script tag in built index.html</div>';
                }
            })
            .catch(error => {
                document.getElementById('test-results').innerHTML += 
                    '<div class="error">❌ Could not load built index.html: ' + error.message + '</div>';
            });
    </script>
</body>
</html>
